function Tintero() {
  const [datos, setDatos] = useState(datosVacios);
  const [biblio, setBiblio] = useState({ libros: [], activo: null });
  const [cargado, setCargado] = useState(false);
  const [tab, setTab] = useState("escribir");
  const [resumenExterno, setResumenExterno] = useState("");
  const [tema, setTema] = useState("claro");
  useEffect(() => {
    (async () => {
      let t = null;
      try { t = window.localStorage.getItem("tintero-tema"); } catch { /* sin localStorage */ }
      if (!t) { try { t = (await window.storage.get("tintero-tema")).value; } catch { /* sin preferencia guardada */ } }
      if (t === "oscuro") { aplicarTema("oscuro"); setTema("oscuro"); }
    })();
  }, []);
  const cambiarTema = () => {
    const t = tema === "claro" ? "oscuro" : "claro";
    aplicarTema(t);
    setTema(t);
    let localOk = true;
    try { window.localStorage.setItem("tintero-tema", t); } catch { localOk = false; }
    if (!localOk) window.storage.set("tintero-tema", t).catch(() => {});
  };
  const activoRef = useRef(null);
  const biblioRef = useRef(null);
  const datosRef = useRef(datosVacios);
  const ultimaEscrituraRef = useRef(0);
  datosRef.current = datos;

  // modo taller compartido (solo en la versión con servidor)
  const esColab = typeof window !== "undefined" && !!window.TINTERO_AUTOR;
  const [visto, setVisto] = useState(0);
  useEffect(() => {
    if (!esColab) return;
    try { setVisto(parseInt(window.localStorage.getItem("tintero-visto") || "0", 10) || 0); } catch { /* sin almacenamiento local */ }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  if (esColab) window.TINTERO_COLAB = { autor: window.TINTERO_AUTOR, visto };
  const marcarLeido = () => {
    const ahora = Date.now();
    setVisto(ahora);
    try { window.localStorage.setItem("tintero-visto", String(ahora)); } catch { /* sin almacenamiento local */ }
  };

  const cargarLibro = async (id) => {
    activoRef.current = id;
    try {
      const r = await window.storage.get("tintero-libro-" + id);
      setDatos({ ...datosVacios, ...JSON.parse(r.value) });
    } catch {
      setDatos(datosVacios);
    }
  };

  useEffect(() => {
    (async () => {
      let b = null;
      try {
        const r = await window.storage.get("tintero-biblioteca");
        b = JSON.parse(r.value);
      } catch {
        // primera vez
      }
      if (!b || !Array.isArray(b.libros) || !b.libros.length) {
        // migrar los datos de la versión de un solo libro, si existen
        let antiguos = null;
        try {
          antiguos = (await window.storage.get(STORAGE_KEY)).value;
        } catch {
          // nada que migrar
        }
        const id = Date.now();
        b = { libros: [{ id, nombre: "Libro 1" }], activo: id };
        try { await window.storage.set("tintero-libro-" + id, antiguos || JSON.stringify(datosVacios)); } catch (e) { console.error(e); }
        try { await window.storage.set("tintero-biblioteca", JSON.stringify(b)); } catch (e) { console.error(e); }
      }
      setBiblio(b);
      biblioRef.current = b;
      await cargarLibro(b.activo);
      setCargado(true);
    })();
  }, []);

  useEffect(() => {
    if (typeof window === "undefined" || !window.TINTERO_AUTOR) return;
    const intervalo = setInterval(async () => {
      if (Date.now() - ultimaEscrituraRef.current < 3000) return;
      const id = activoRef.current;
      if (id == null) return;
      try {
        const r = await window.storage.get("tintero-libro-" + id);
        if (r && r.value && r.value !== JSON.stringify(datosRef.current)) {
          const remoto = { ...datosVacios, ...JSON.parse(r.value) };
          datosRef.current = remoto;
          setDatos(remoto);
        }
      } catch { /* sin conexión: seguimos con lo local */ }
      try {
        const rb = await window.storage.get("tintero-biblioteca");
        if (rb && rb.value && rb.value !== JSON.stringify(biblioRef.current)) {
          const b = JSON.parse(rb.value);
          biblioRef.current = b;
          setBiblio(b);
        }
      } catch { /* idem */ }
    }, 5000);
    return () => clearInterval(intervalo);
  }, []);

  const persistirBiblio = (b) => {
    setBiblio(b);
    biblioRef.current = b;
    window.storage.set("tintero-biblioteca", JSON.stringify(b)).catch((e) => console.error(e));
  };

  const guardar = useCallback((nuevos) => {
    const autor = (typeof window !== "undefined" && window.TINTERO_AUTOR) || "";
    const sellados = autor ? estampar(datosRef.current, nuevos, autor) : nuevos;
    setDatos(sellados);
    datosRef.current = sellados;
    ultimaEscrituraRef.current = Date.now();
    const id = activoRef.current;
    if (id == null) return;
    window.storage.set("tintero-libro-" + id, JSON.stringify(sellados)).catch((e) => console.error("No se pudo guardar", e));
    // el nombre del libro en la biblioteca sigue al título de la obra
    const b = biblioRef.current;
    if (b && sellados.titulo) {
      const libro = b.libros.find((l) => l.id === id);
      if (libro && libro.nombre !== sellados.titulo) {
        persistirBiblio({ ...b, libros: b.libros.map((l) => (l.id === id ? { ...l, nombre: sellados.titulo } : l)) });
      }
    }
  }, []);

  const cambiarLibro = async (id) => {
    persistirBiblio({ ...biblioRef.current, activo: id });
    await cargarLibro(id);
    setTab("escribir");
  };

  const crearLibro = async () => {
    const b = biblioRef.current;
    const id = Date.now();
    const nuevo = { id, nombre: "Libro " + (b.libros.length + 1) };
    try { await window.storage.set("tintero-libro-" + id, JSON.stringify(datosVacios)); } catch (e) { console.error(e); }
    persistirBiblio({ libros: [...b.libros, nuevo], activo: id });
    activoRef.current = id;
    setDatos(datosVacios);
    setTab("escribir");
  };

  const borrarLibro = async () => {
    const b = biblioRef.current;
    if (b.libros.length <= 1) return;
    const id = b.activo;
    const restantes = b.libros.filter((l) => l.id !== id);
    try { await window.storage.delete("tintero-libro-" + id); } catch { /* puede no existir */ }
    persistirBiblio({ libros: restantes, activo: restantes[0].id });
    await cargarLibro(restantes[0].id);
  };

  const crearIdea = (texto) => {
    const idea = { id: Date.now(), texto, fecha: new Date().toLocaleDateString("es-ES"), apuntes: [] };
    guardar({ ...datos, ideas: [idea, ...(datos.ideas || [])] });
    setTab("ideas");
  };

  const usarComoResumen = (texto) => {
    setResumenExterno(texto);
    setTab("escribir");
  };

  const aIdeas = (nota) => {
    const idea = { id: Date.now(), texto: nota.texto, fecha: new Date().toLocaleDateString("es-ES"), apuntes: [] };
    guardar({ ...datos, ideas: [idea, ...(datos.ideas || [])], notas: datos.notas.filter((x) => x.id !== nota.id) });
    setTab("ideas");
  };

  if (!cargado)
    return (
      <div className="flex min-h-screen items-center justify-center" style={{ background: C.bg, color: C.dim }}>
        Abriendo el taller…
      </div>
    );

  return (
    <div
      className="min-h-screen overflow-x-hidden pb-32"
      style={{
        background: `repeating-linear-gradient(0deg, rgba(110,90,50,0.028) 0 1px, transparent 1px 3px), radial-gradient(1100px 520px at 50% -160px, ${C.glow}, transparent 62%), linear-gradient(180deg, ${C.grad1} 0%, ${C.bg} 45%, ${C.grad3} 100%)`,
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=EB+Garamond:ital@0;1&display=swap');
        .f-titulo { font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; }
        * { -webkit-tap-highlight-color: transparent; }
        @media (max-width: 639px) {
          input, select, textarea { font-size: 16px !important; }
        }
      `}</style>
      <header className="relative px-5 pb-5 pt-9 text-center">
        <button
          onClick={cambiarTema}
          title={tema === "claro" ? "Modo oscuro" : "Modo claro"}
          className="absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-full text-base"
          style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.amber }}
        >
          {tema === "claro" ? "☾" : "☀"}
        </button>
        <h1 className="f-titulo text-5xl italic" style={{ color: C.text, textShadow: C.tituloSombra }}>
          Tintero
        </h1>
        <div className="mx-auto mt-2 flex max-w-xs items-center justify-center gap-3">
          <span className="h-px flex-1" style={{ background: `linear-gradient(90deg, transparent, ${C.amber}88)` }} />
          <span style={{ color: C.amber }}>❦</span>
          <span className="h-px flex-1" style={{ background: `linear-gradient(90deg, ${C.amber}88, transparent)` }} />
        </div>
        <p className="f-titulo mt-1 text-lg italic" style={{ color: C.dim }}>
          Donde las ideas se vuelven tinta
        </p>
        <p className="mt-1 text-[11px] tracking-widest uppercase" style={{ color: C.dim, opacity: 0.85 }}>
          {(datos.ideas || []).length} ideas · {datos.biblia.length} fichas · {datos.escenas.length} escenas
        </p>
        <div className="mx-auto mt-3 flex max-w-sm items-center justify-center gap-2 px-2">
          <select
            value={biblio.activo || ""}
            onChange={(e) => cambiarLibro(Number(e.target.value))}
            className="min-w-0 flex-1 rounded-lg px-3 py-2 text-sm outline-none"
            style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}` }}
          >
            {biblio.libros.map((l) => (
              <option key={l.id} value={l.id}>{l.nombre}</option>
            ))}
          </select>
          <Boton pequeno onClick={crearLibro}>+ Libro</Boton>
          {biblio.libros.length > 1 && <BorrarLibro onConfirm={borrarLibro} />}
        </div>
        {esColab && (
          <div className="mx-auto mt-2 flex max-w-sm flex-wrap items-center justify-center gap-2 text-xs" style={{ color: C.dim }}>
            <span>
              Taller compartido · escribes como <b style={{ color: C.amber }}>{window.TINTERO_AUTOR}</b>
            </span>
            <Boton pequeno onClick={marcarLeido}>He leído lo nuevo</Boton>
          </div>
        )}
        <div className="mx-auto max-w-sm">
          <TituloLibro datos={datos} guardar={guardar} />
        </div>
      </header>
      <main className="mx-auto max-w-2xl px-4">
        {tab === "escribir" && <TabEscribir datos={datos} guardar={guardar} resumenExterno={resumenExterno} setResumenExterno={setResumenExterno} />}
        {tab === "trama" && <TabTrama datos={datos} guardar={guardar} usarComoResumen={usarComoResumen} />}
        {tab === "ideas" && <TabIdeas datos={datos} guardar={guardar} usarComoResumen={usarComoResumen} />}
        {tab === "biblia" && <TabBiblia datos={datos} guardar={guardar} />}
        {tab === "notas" && <TabNotas datos={datos} guardar={guardar} usarComoResumen={usarComoResumen} aIdeas={aIdeas} crearIdea={crearIdea} />}
        {tab === "estilo" && <TabEstilo datos={datos} guardar={guardar} />}
      </main>
      <nav
        className="fixed inset-x-3 bottom-3 mx-auto flex max-w-2xl justify-around rounded-2xl px-2 py-2"
        style={{ background: C.navBg, border: `1px solid ${C.border}`, backdropFilter: "blur(10px)", boxShadow: "0 8px 24px rgba(20,14,4,0.25)" }}
      >
        {TABS.map((t) => (
          <button key={t.id} onClick={() => setTab(t.id)} className="flex flex-col items-center gap-0.5 rounded-lg px-2 py-1.5">
            <span className="text-base" style={{ color: tab === t.id ? C.amber : C.dim }}>{t.icono}</span>
            <span className="text-[11px] font-medium" style={{ color: tab === t.id ? C.amber : C.dim }}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Tintero />);
</script>
</body>
</html>
