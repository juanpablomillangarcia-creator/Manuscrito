<script>
(function () {
  // ── sala y nombre de quien escribe ──
  let sala = localStorage.getItem("tintero-sala");
  let autor = localStorage.getItem("tintero-autor");
  if (!sala) {
    sala = (prompt("Código de vuestro taller compartido.\nInventad uno y usad EXACTAMENTE el mismo tu hermana y tú (ej.: hermanos-bosque-2026):") || "taller").trim();
    localStorage.setItem("tintero-sala", sala);
  }
  if (!autor) {
    autor = (prompt("Tu nombre (para que se vea quién escribe qué):") || "Yo").trim();
    localStorage.setItem("tintero-autor", autor);
  }
  window.TINTERO_SALA = sala;
  window.TINTERO_AUTOR = autor;

  const base = "/api/kv/" + encodeURIComponent(sala) + "/";

  // ── almacenamiento: servidor compartido con copia local de respaldo ──
  window.storage = {
    async get(key) {
      try {
        const r = await fetch(base + encodeURIComponent(key));
        if (r.ok) {
          const j = await r.json();
          localStorage.setItem("tintero:" + key, j.value);
          return { key, value: j.value };
        }
      } catch (e) { /* sin conexión: usamos la copia local */ }
      const local = localStorage.getItem("tintero:" + key);
      if (local !== null) {
        // el servidor está vacío (reinicio): lo resembramos con nuestra copia
        fetch(base + encodeURIComponent(key), { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ value: local, autor }) }).catch(() => {});
        return { key, value: local };
      }
      throw new Error("no existe");
    },
    async set(key, value) {
      localStorage.setItem("tintero:" + key, value);
      try {
        await fetch(base + encodeURIComponent(key), { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ value, autor }) });
      } catch (e) { /* sin conexión: quedó guardado en local */ }
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem("tintero:" + key);
      try {
        await fetch(base + encodeURIComponent(key), { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ value: "", autor }) });
      } catch (e) { /* sin conexión */ }
      return { key, deleted: true };
    },
    async list() { return { keys: [] }; }
  };

  // ── clave de la IA (cada uno en su navegador; podéis usar la misma) ──
  window.TINTERO_OBTENER_CLAVE = function () {
    let k = localStorage.getItem("tintero-clave-api");
    if (!k) {
      k = prompt("Para usar la IA necesitas una clave de API de Anthropic (console.anthropic.com).\nPegala aqui (empieza por sk-ant-). Se guarda solo en este navegador.");
      if (k && k.trim()) localStorage.setItem("tintero-clave-api", k.trim()); else return null;
    }
    return localStorage.getItem("tintero-clave-api");
  };
})();
</script>

// ─── Llamada a la IA ───
async function llamarIA(prompt) {
  const headers = { "Content-Type": "application/json" };
  if (typeof window !== "undefined" && window.TINTERO_OBTENER_CLAVE) {
    const clave = window.TINTERO_OBTENER_CLAVE();
    if (!clave) throw new Error("Falta la clave de API");
    headers["x-api-key"] = clave;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return (data.content || [])
    .map((b) => (b.type === "text" ? b.text : ""))
    .filter(Boolean)
    .join("\n");
}

function serializarBiblia(biblia) {
  if (!biblia.length) return "(La biblia está vacía por ahora.)";
  return biblia
    .map((e) => `- [${TIPOS[e.tipo]?.label || e.tipo}] ${e.nombre}: ${e.descripcion}`)
    .join("\n");
}

async function extraerEntidades(texto, biblia) {
  const prompt = `Analiza este texto narrativo o nota de un escritor y extrae las entidades de su mundo de ficción Y las relaciones entre ellas.

TEXTO:
${texto}

ENTIDADES YA CONOCIDAS (no las repitas salvo que haya información NUEVA relevante sobre ellas):
${serializarBiblia(biblia)}

Responde SOLO con JSON válido, sin markdown ni explicaciones, con este formato exacto:
{"entidades":[{"tipo":"personaje","nombre":"...","descripcion":"breve ficha en 1-2 frases"}],"relaciones":[{"origen":"nombre exacto","destino":"nombre exacto","relacion":"hermano de / vive en / odia a / esconde / trabaja para..."}]}

Los tipos permitidos son exactamente: personaje, lugar, objeto, secreto. En las relaciones usa los nombres exactos de las entidades (nuevas o ya conocidas). Si no hay nada nuevo, devuelve {"entidades":[],"relaciones":[]}.`;
  const raw = await llamarIA(prompt);
  const limpio = raw.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(limpio);
  return {
    entidades: Array.isArray(parsed.entidades) ? parsed.entidades : [],
    relaciones: Array.isArray(parsed.relaciones) ? parsed.relaciones : [],
  };
}

async function extraerRelacionesDeFichas(fichas, biblia) {
  const texto = fichas.map((f) => `- ${f.nombre} (${f.tipo}): ${f.descripcion}`).join("\n").slice(0, 7000);
  const nombres = biblia.map((e) => e.nombre).join(", ");
  const prompt = `Lee estas fichas de un mundo de ficción y deduce TODAS las relaciones que se mencionan o se deducen con claridad: parentesco, amor, odio, amistad, enemistad, residencia, pertenencia, trabajo, posesión, secretos compartidos, lo que sea.

FICHAS:
${texto}

ENTIDADES VÁLIDAS DEL MUNDO (usa exactamente estos nombres):
${nombres}

Ejemplo: si una ficha dice "Willy es el hermano mayor de Alea y se quieren mucho", devuelve dos relaciones: Willy "hermano mayor de" Alea y Willy "se quiere con" Alea.

Responde SOLO con JSON válido, sin markdown:
{"relaciones":[{"origen":"nombre exacto","destino":"nombre exacto","relacion":"hermano de / ama a / odia a / vive en / esconde / trabaja para..."}]}
Solo relaciones entre entidades de la lista válida, con la relación expresada en 1-4 palabras. Si no hay ninguna, devuelve {"relaciones":[]}.`;
  const parsed = JSON.parse((await llamarIA(prompt)).replace(/```json|```/g, "").trim());
  return Array.isArray(parsed.relaciones) ? parsed.relaciones : [];
}

// ─── Dictado por voz ───
function useDictado(onTextoFinal) {
  const [escuchando, setEscuchando] = useState(false);
  const [parcial, setParcial] = useState("");
  const [soportado, setSoportado] = useState(true);
  const [error, setError] = useState("");
  const recRef = useRef(null);

  const parar = useCallback(() => {
    if (recRef.current) {
      const rec = recRef.current;
      recRef.current = null;
      rec.onend = null;
      try { rec.stop(); } catch { /* ya parado */ }
    }
    setEscuchando(false);
    setParcial("");
  }, []);

  const empezar = useCallback(async () => {
    setError("");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setSoportado(false);
      setError("Este navegador no tiene dictado de voz. Abre el archivo tintero.html en Chrome (móvil u ordenador) y funcionará.");
      return;
    }
    try {
      if (navigator.mediaDevices?.getUserMedia) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((t) => t.stop());
      }
    } catch {
      setError("El micrófono está bloqueado en esta vista. Concede el permiso, o abre tintero.html en Chrome para dictar sin límites.");
      return;
    }
    try {
      const rec = new SR();
      rec.lang = "es-ES";
      rec.continuous = true;
      rec.interimResults = true;
      rec.onresult = (ev) => {
        let interim = "";
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const r = ev.results[i];
          if (r.isFinal) onTextoFinal(r[0].transcript.trim() + " ");
          else interim += r[0].transcript;
        }
        setParcial(interim);
      };
      rec.onerror = (ev) => {
        const codigo = (ev && ev.error) || "";
        if (codigo === "not-allowed" || codigo === "service-not-allowed") {
          setError("El dictado está bloqueado en esta vista. Abre tintero.html en Chrome y funcionará.");
        } else if (codigo === "no-speech") {
          setError("No se detectó voz. Prueba de nuevo hablando cerca del micrófono.");
        } else if (codigo && codigo !== "aborted") {
          setError("El dictado se interrumpió (" + codigo + "). Prueba de nuevo.");
        }
        parar();
      };
      rec.onend = () => {
        // reintenta si el navegador corta solo
        if (recRef.current === rec) {
          try { rec.start(); } catch { parar(); }
        }
      };
      recRef.current = rec;
      rec.start();
      setEscuchando(true);
    } catch {
      setError("No se pudo iniciar el dictado en este navegador. Prueba con Chrome.");
    }
  }, [onTextoFinal, parar]);

  useEffect(() => () => parar(), [parar]);
  return { escuchando, parcial, soportado, error, empezar, parar };
}

// ─── Componentes pequeños ───
function Boton({ children, onClick, primario, pequeno, disabled, style }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`rounded-lg font-medium transition-opacity ${pequeno ? "px-3 py-1.5 text-xs" : "px-4 py-2.5 text-sm"} ${disabled ? "opacity-40" : "active:opacity-70"}`}
      style={{
        background: primario ? C.amber : C.surface2,
        color: primario ? C.sobreAcento : C.text,
        border: `1px solid ${primario ? C.amber : C.border}`,
        ...style,
      }}
    >
      {children}
    </button>
  );
}

function BotonMic({ dictado, mini }) {
  return (
    <div className="flex flex-col gap-1">
      <button
        onClick={dictado.escuchando ? dictado.parar : dictado.empezar}
        className={`flex items-center gap-2 rounded-full font-medium ${mini ? "px-3 py-1 text-xs" : "px-4 py-2 text-sm"}`}
        style={{
          background: dictado.escuchando ? "#9C3D2C" : C.surface2,
          color: dictado.escuchando ? "#fff" : C.text,
          border: `1px solid ${dictado.escuchando ? "#9C3D2C" : C.border}`,
        }}
      >
        <span
          className={`inline-block h-2 w-2 rounded-full ${dictado.escuchando ? "animate-pulse" : ""}`}
          style={{ background: dictado.escuchando ? "#fff" : C.amber }}
        />
        {dictado.escuchando ? (mini ? "Parar" : "Detener dictado") : (mini ? "Dictar" : "Dictar por voz")}
      </button>
      {dictado.error && (
        <span className="max-w-xs text-xs leading-snug" style={{ color: "#9C3D2C" }}>{dictado.error}</span>
      )}
    </div>
  );
}

function Area({ value, onChange, placeholder, rows = 4 }) {
  return (
    <textarea
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      rows={rows}
      className="w-full resize-y rounded-xl p-3 text-sm outline-none"
      style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}` }}
    />
  );
}

function EtiquetaNuevo({ item }) {
  const colab = typeof window !== "undefined" ? window.TINTERO_COLAB : null;
  if (!colab || !item || !item._autor || item._autor === colab.autor || !(item._ts > colab.visto)) return null;
  return (
    <span className="rounded-full px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wider" style={{ background: C.amber, color: C.sobreAcento }}>
      Nuevo · {item._autor}
    </span>
  );
}

function estampar(prev, next, autor) {
  const listas = ["escenas", "notas", "ideas", "biblia", "relaciones"];
  const ahora = Date.now();
  const sinSello = (x) => JSON.stringify({ ...x, _ts: 0, _autor: "" });
  const out = { ...next };
  for (const k of listas) {
    if (!Array.isArray(next[k])) continue;
    const previas = new Map(((prev && prev[k]) || []).map((x) => [x.id, sinSello(x)]));
    out[k] = next[k].map((x) => (previas.get(x.id) === sinSello(x) ? x : { ...x, _ts: ahora, _autor: autor }));
  }
  return out;
}

function AreaConMic({ value, onChange, placeholder, rows = 3 }) {
  const valorRef = useRef(value);
  valorRef.current = value;
  const dictado = useDictado((t) => onChange((valorRef.current || "") + t));
  return (
    <div>
      <Area value={(value || "") + (dictado.parcial ? " " + dictado.parcial : "")} onChange={onChange} placeholder={placeholder} rows={rows} />
      <div className="mt-1 flex">
        <BotonMic dictado={dictado} mini />
      </div>
    </div>
  );
}

function Aviso({ texto }) {
  if (!texto) return null;
  return (

      {texto}
    </div>
  );
}

// ─── Pulir: editor literario profesional ───
async function revisarTexto(texto, genero, estilo) {
  const prompt = `Eres un editor literario profesional en español. Revisa el texto de un autor y propón mejoras puntuales y concretas, sin reescribirlo entero y respetando su voz.

GÉNERO DE LA OBRA (vigila que el registro no se salga de él):
${(GENEROS[genero] || GENEROS.auto).guia}

MAESTROS DE REFERENCIA (usa sus técnicas como vara de medir):
${CANON[genero] || CANON.auto}
${estilo ? `\nMUESTRA DEL ESTILO DEL AUTOR (corrige sin uniformizar su voz):\n${estilo.slice(0, 800)}\n` : ""}
TEXTO A REVISAR:
${texto}

Busca: errores gramaticales u ortográficos, palabras débiles o repetidas, frases confusas, problemas de ritmo, clichés, y desajustes de registro con el género.

Responde SOLO con JSON válido, sin markdown:
{"valoracion":"1-2 frases honestas y útiles sobre el texto en conjunto","sugerencias":[{"original":"fragmento EXACTO copiado literalmente del texto (máx 12 palabras)","propuesta":"cómo quedaría mejor","motivo":"por qué, en pocas palabras","tipo":"gramática"}]}
Tipos permitidos: gramática, palabra, estilo, ritmo, género. Máximo 8 sugerencias, las más importantes primero. El campo "original" debe aparecer tal cual en el texto.`;
  const raw = await llamarIA(prompt);
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

function PulirPanel({ datos, guardar }) {
  const [texto, setTexto] = useState("");
  const [valoracion, setValoracion] = useState("");
  const [sugerencias, setSugerencias] = useState([]);
  const [cargando, setCargando] = useState(false);
  const [estado, setEstado] = useState("");
  const [focoTotal, setFocoTotal] = useState(false);
  const dictado = useDictado((t) => setTexto((p) => p + t));
  const palabras = texto.trim() ? texto.trim().split(/\s+/).length : 0;

  const revisar = async () => {
    if (!texto.trim()) return;
    dictado.parar();
    setCargando(true);
    setEstado("");
    setSugerencias([]);
    setValoracion("");
    try {
      const r = await revisarTexto(texto, datos.genero || "auto", datos.estilo);
      setValoracion(r.valoracion || "");
      setSugerencias(Array.isArray(r.sugerencias) ? r.sugerencias : []);
    } catch {
      setEstado("No se pudo revisar el texto. Inténtalo de nuevo.");
    }
    setCargando(false);
  };

  const aplicar = (s) => {
    if (!texto.includes(s.original)) return;
    setTexto(texto.replace(s.original, s.propuesta));
    setSugerencias(sugerencias.filter((x) => x !== s));
  };

  const guardarEnManuscrito = () => {
    const caps = datos.capitulos && datos.capitulos.length ? datos.capitulos : ["Capítulo 1"];
    const nueva = { id: Date.now(), titulo: texto.slice(0, 60) + (texto.length > 60 ? "…" : ""), texto, capitulo: caps[caps.length - 1], fecha: new Date().toLocaleDateString("es-ES") };
    guardar({ ...datos, escenas: [...datos.escenas, nueva] });
    setEstado("Texto guardado en tu manuscrito.");
  };

  const tipoColor = { gramática: "#9C3D2C", palabra: "#B07A2E", estilo: "#3E6B8C", ritmo: "#4F6B3A", género: "#6E4E8C" };

  return (
    <div className="flex flex-col gap-3">
      <p className="text-xs leading-relaxed" style={{ color: C.dim }}>
        Escribe o dicta tu propio texto y el editor lo revisará como un profesional: erratas, palabras mejores, ritmo y avisos si algo se sale del género. Tú decides qué cambios aplicar.
      </p>
      <Area value={texto + (dictado.parcial ? " " + dictado.parcial : "")} onChange={setTexto} placeholder="Escribe aquí tu texto tal y como te salga…" rows={8} />
      <div className="flex flex-wrap gap-2">
        <BotonMic dictado={dictado} />
        <Boton primario onClick={revisar} disabled={cargando || !texto.trim()}>
          {cargando ? "Revisando…" : "Revisar texto"}
        </Boton>
        <Boton onClick={guardarEnManuscrito} disabled={!texto.trim()}>Guardar en manuscrito</Boton>
        <Boton onClick={() => setFocoTotal(true)}>⛶ Sin distracciones</Boton>
      </div>
      {focoTotal && (
        <div className="fixed inset-0 z-50 flex flex-col" style={{ background: "linear-gradient(180deg, #FBF7EB 0%, #F4EEDE 100%)" }}>
          <div className="flex items-center justify-between px-4 py-3" style={{ borderBottom: `1px solid ${C.border}` }}>
            <span className="f-titulo text-lg italic" style={{ color: C.amber }}>Tintero</span>
            <div className="flex items-center gap-3">
              <span className="text-xs" style={{ color: C.dim }}>{palabras} palabras</span>
              <Boton pequeno onClick={() => setFocoTotal(false)}>Salir</Boton>
            </div>
          </div>
          <textarea
            autoFocus
            value={texto + (dictado.parcial ? " " + dictado.parcial : "")}
            onChange={(e) => setTexto(e.target.value)}
            placeholder="Solo tú y la página…"
            className="w-full flex-1 resize-none px-6 pb-4 pt-4 outline-none"
            style={{ background: "transparent", color: C.paperInk, fontFamily: "'EB Garamond', Georgia, serif", fontSize: 19, lineHeight: 1.75 }}
          />
          <div className="flex justify-center px-4 pb-5">
            <BotonMic dictado={dictado} />
          </div>
        </div>
      )}
      <Aviso texto={estado} />
      {valoracion && (
        <div className="rounded-xl p-3 text-sm leading-relaxed" style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}` }}>
          <span className="mb-1 block text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>El editor opina</span>
          {valoracion}
        </div>
      )}
      {sugerencias.map((s, i) => (
        <div key={i} className="rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
          <span className="rounded-full px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider" style={{ background: C.surface2, color: tipoColor[s.tipo] || C.amber, border: `1px solid ${C.border}` }}>
            {s.tipo}
          </span>
          <p className="mt-2 text-sm line-through" style={{ color: "#9C3D2C" }}>{s.original}</p>
          <p className="text-sm" style={{ color: "#4F6B3A" }}>{s.propuesta}</p>
          <p className="mt-1 text-xs leading-relaxed" style={{ color: C.dim }}>{s.motivo}</p>
          <div className="mt-2 flex gap-2">
            <Boton pequeno primario onClick={() => aplicar(s)} disabled={!texto.includes(s.original)}>Aplicar</Boton>
            <Boton pequeno onClick={() => setSugerencias(sugerencias.filter((x) => x !== s))}>Descartar</Boton>
          </div>
        </div>
      ))}
    </div>
  );
}

function contarPalabras(escenas) {
  return escenas.reduce((s, e) => s + (e.texto ? e.texto.trim().split(/\s+/).length : 0), 0);
}

function MetaPalabras({ datos, guardar }) {
  const [editando, setEditando] = useState(false);
  const [obj, setObj] = useState(datos.objetivo || 500);
  const hoy = new Date().toISOString().slice(0, 10);
  const total = contarPalabras(datos.escenas);
  useEffect(() => {
    if (!datos.metaDia || datos.metaDia.fecha !== hoy) {
      guardar({ ...datos, metaDia: { fecha: hoy, base: total } });
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [datos.metaDia && datos.metaDia.fecha]);
  const base = datos.metaDia && datos.metaDia.fecha === hoy ? datos.metaDia.base : total;
  const hechas = Math.max(0, total - base);
  const objetivo = datos.objetivo || 500;
  const pct = Math.min(100, Math.round((hechas / objetivo) * 100));
  return (
    <div className="rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
      <div className="flex items-center justify-between text-xs">
        <span style={{ color: C.dim }}>
          Hoy: <span style={{ color: C.text, fontWeight: 600 }}>{hechas}</span> / {objetivo} palabras{pct >= 100 ? " · ¡Objetivo cumplido! ❦" : ""}
        </span>
        {editando ? (
          <span className="flex items-center gap-1">
            <input type="number" value={obj} onChange={(e) => setObj(e.target.value)} className="w-20 rounded px-2 py-0.5 text-xs outline-none" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }} />
            <Boton pequeno onClick={() => { guardar({ ...datos, objetivo: Math.max(50, parseInt(obj, 10) || 500) }); setEditando(false); }}>OK</Boton>
          </span>
        ) : (
          <button onClick={() => { setObj(objetivo); setEditando(true); }} className="text-xs underline" style={{ color: C.dim }}>
            cambiar meta
          </button>
        )}
      </div>
      <div className="mt-1.5 h-2 overflow-hidden rounded-full" style={{ background: C.surface2 }}>
        <div className="h-full rounded-full" style={{ width: pct + "%", background: pct >= 100 ? "#4F6B3A" : C.amber, transition: "width .4s" }} />
      </div>
    </div>
  );
}

function TabEscribir({ datos, guardar, resumenExterno, setResumenExterno }) {
  const [resumen, setResumen] = useState("");
  const [modo, setModo] = useState("auto");
  const [tono, setTono] = useState(TONOS[0]);
  const [escena, setEscena] = useState("");
  const [cargando, setCargando] = useState(false);
  const [estado, setEstado] = useState("");
  const [consejo, setConsejo] = useState("");
  const [cargandoConsejo, setCargandoConsejo] = useState(false);
  const dictado = useDictado((t) => setResumen((p) => p + t));

  useEffect(() => {
    if (resumenExterno) {
      setResumen(resumenExterno);
      setModo("auto");
      setResumenExterno("");
    }
  }, [resumenExterno, setResumenExterno]);

  const generar = async () => {
    if (!resumen.trim()) return;
    dictado.parar();
    setCargando(true);
    setEstado("");
    setEscena("");
    try {
      const prompt = `Eres un novelista profesional en español, de prosa densa, precisa y evocadora. Escribe una escena narrativa completa (500-700 palabras) a partir del resumen del autor.

BIBLIA DE LA HISTORIA (respétala con total coherencia):
${serializarBiblia(datos.biblia)}
${datos.escenas.length ? `\nFINAL DE LA ÚLTIMA ESCENA DEL MANUSCRITO (mantén la continuidad narrativa con ella si procede):\n…${datos.escenas[datos.escenas.length - 1].texto.slice(-600)}\n` : ""}
${datos.estilo ? `\nMUESTRA DEL ESTILO DEL AUTOR (imita su voz, ritmo y vocabulario):\n${datos.estilo.slice(0, 1500)}\n` : ""}
GÉNERO Y ESCUELA LITERARIA (obedécelo por encima de todo):
${(GENEROS[datos.genero] || GENEROS.auto).guia}

MAESTROS DE REFERENCIA (inspírate en sus técnicas, jamás copies pasajes):
${CANON[datos.genero] || CANON.auto}

TONO PEDIDO: ${tono}

RESUMEN DEL AUTOR:
${resumen}

Reglas: coherencia absoluta con el género (nada de mezclas de registro salvo que el resumen lo pida explícitamente), muestra en vez de contar, diálogos naturales, nada de meta-comentarios ni títulos. Responde solo con la escena.`;
      const texto = await llamarIA(prompt);
      setEscena(texto);
      // Actualizar la biblia en segundo plano
      setEstado("Actualizando la biblia…");
      try {
        const ext = await extraerEntidades(texto, datos.biblia);
        if (ext.entidades.length || ext.relaciones.length) {
          guardar({
            ...datos,
            biblia: fusionarEntidades(datos.biblia, ext.entidades),
            relaciones: fusionarRelaciones(datos.relaciones, ext.relaciones),
          });
          setEstado(`Biblia actualizada: ${ext.entidades.length} ficha(s) y ${ext.relaciones.length} relación(es).`);
        } else setEstado("La biblia ya estaba al día.");
      } catch {
        setEstado("La escena está lista; la biblia no se pudo actualizar esta vez.");
      }
    } catch {
      setEstado("No se pudo generar la escena. Inténtalo de nuevo.");
    }
    setCargando(false);
  };

  const consejoMaestros = async () => {
    if (!resumen.trim()) return;
    setCargandoConsejo(true);
    setConsejo("");
    try {
      const prompt = `Actúas como un consejo de grandes maestros de la literatura reunidos para ayudar a un autor antes de escribir una escena.

GÉNERO:
${(GENEROS[datos.genero] || GENEROS.auto).guia}

MAESTROS DE REFERENCIA Y SUS TÉCNICAS:
${CANON[datos.genero] || CANON.auto}

LA ESCENA QUE VA A ESCRIBIR:
${resumen}
${datos.escenas.length ? `\nFINAL DE LA ÚLTIMA ESCENA DEL MANUSCRITO:\n…${datos.escenas[datos.escenas.length - 1].texto.slice(-400)}` : ""}

En 4-6 frases, concretas y aplicadas a ESTA escena: qué enfoque tomaría un maestro del género (punto de vista, dónde empezar exactamente, ritmo), qué mostrar y qué callar, y UN truco específico de uno de los maestros citados aplicado aquí (nómbralo). Nada de generalidades: consejos que se puedan ejecutar ya.`;
      setConsejo(await llamarIA(prompt));
    } catch {
      setConsejo("Los maestros no respondieron esta vez. Espera unos segundos y vuelve a llamarlos.");
    }
    setCargandoConsejo(false);
  };

  const guardarEscena = () => {
    const caps = datos.capitulos && datos.capitulos.length ? datos.capitulos : ["Capítulo 1"];
    const nueva = {
      id: Date.now(),
      titulo: resumen.slice(0, 60) + (resumen.length > 60 ? "…" : ""),
      texto: escena,
      capitulo: caps[caps.length - 1],
      fecha: new Date().toLocaleDateString("es-ES"),
    };
    guardar({ ...datos, escenas: [...datos.escenas, nueva] });
    setEstado("Escena guardada en tu manuscrito.");
  };

  return (
    <div className="flex flex-col gap-3">
      <MetaPalabras datos={datos} guardar={guardar} />
      <div className="flex rounded-xl p-1" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
        {[["auto", "Auto-escritor"], ["pulir", "Pulir mi texto"]].map(([m, l]) => (
          <button key={m} onClick={() => setModo(m)} className="flex-1 rounded-lg py-2 text-sm font-medium" style={{ background: modo === m ? C.amber : "transparent", color: modo === m ? C.sobreAcento : C.dim }}>
            {l}
          </button>

      </div>
      <select
        value={datos.genero || "auto"}

      {modo === "pulir" ? (

        <>
      <p className="text-xs leading-relaxed" style={{ color: C.dim }}>
        Cuenta en pocas líneas qué pasa: quién, dónde, qué busca o evita. El taller escribe la escena con tu biblia, tu estilo y las reglas del género.
      </p>
      <Area value={resumen + (dictado.parcial ? " " + dictado.parcial : "")} onChange={setResumen} placeholder="Ej.: Mara entra de noche en el archivo de Vallehondo para robar el registro antes de que el juez lo queme…" rows={4} />
      <div className="flex flex-wrap items-center gap-2">
        <BotonMic dictado={dictado} />
        <select
          value={tono}
          onChange={(e) => setTono(e.target.value)}

          style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
        >
          {TONOS.map((t) => (
            <option key={t}>{t}</option>
          ))}
        </select>
        <Boton primario onClick={generar} disabled={cargando || !resumen.trim()}>
          {cargando ? "Escribiendo…" : "Escribir escena"}

        <Boton onClick={consejoMaestros} disabled={cargandoConsejo || !resumen.trim()}>

      </div>
      {consejo && (
        <div className="rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
          <span className="mb-1 block text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>

          </span>
          <p className="whitespace-pre-wrap text-sm leading-relaxed" style={{ color: C.text }}>{consejo}</p>

      <Aviso texto={estado} />

        <div className="rounded-xl p-5 shadow-lg" style={{ background: C.paper, color: C.paperInk }}>
          <div className="whitespace-pre-wrap text-[17px] leading-relaxed" style={{ fontFamily: "'EB Garamond', Georgia, 'Times New Roman', serif" }}>

            <Boton pequeno onClick={() => navigator.clipboard?.writeText(escena)} style={{ background: "transparent", color: C.paperDim, borderColor: "#CFC4A8" }}>

            <Boton pequeno onClick={generar} style={{ background: "transparent", color: C.paperDim, borderColor: "#CFC4A8" }}>
              Otra versión

function CorchoLibre({ datos, guardar }) {
  const [pos, setPos] = useState({});
  const [ancho, setAncho] = useState(800);
  const arrastreRef = useRef(null);
  const contRef = useRef(null);
  const escenas = datos.escenas;

  useEffect(() => {
    const medir = () => contRef.current && setAncho(contRef.current.clientWidth || 800);
    medir();
    window.addEventListener("resize", medir);
    return () => window.removeEventListener("resize", medir);
  }, []);

  const anchoTarjeta = Math.min(240, Math.max(148, ancho * 0.27));
  const maxX = Math.max(0, ((ancho - anchoTarjeta - 8) / ancho) * 100);
  const columnas = ancho < 520 ? 2 : 3;
  const posDe = (e, i) => {
    const p = pos[e.id] || e.corchoPos || { x: 3 + (i % columnas) * (92 / columnas), y: 40 + Math.floor(i / columnas) * 180 };
    return { x: Math.min(p.x, maxX), y: p.y };
  };
  const alto = Math.max(640, ...escenas.map((e, i) => posDe(e, i).y + 260));

  const mover = (id, dir) => {
    const arr = [...escenas];
    const idx = arr.findIndex((e) => e.id === id);
    if (idx < 0) return;
    const cap = arr[idx].capitulo || "";
    let j = idx + dir;
    while (j >= 0 && j < arr.length && (arr[j].capitulo || "") !== cap) j += dir;
    if (j < 0 || j >= arr.length) return;
    [arr[idx], arr[j]] = [arr[j], arr[idx]];
    guardar({ ...datos, escenas: arr });
  };

  const bajar = (ev, esc, i) => {
    if (ev.target.closest("button")) return;
    const rect = contRef.current.getBoundingClientRect();
    const p = posDe(esc, i);
    arrastreRef.current = { id: esc.id, dx: ev.clientX - (rect.left + (p.x / 100) * rect.width), dy: ev.clientY - (rect.top + p.y) };
    ev.currentTarget.setPointerCapture(ev.pointerId);
  };
  const moverPuntero = (ev) => {
    const a = arrastreRef.current;
    if (!a || !contRef.current) return;
    const rect = contRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(maxX, ((ev.clientX - a.dx - rect.left) / rect.width) * 100));
    const y = Math.max(24, ev.clientY - a.dy - rect.top);
    setPos((p) => ({ ...p, [a.id]: { x, y } }));
  };
  const soltar = () => {
    const a = arrastreRef.current;
    if (!a) return;
    arrastreRef.current = null;
    const p = pos[a.id];
    if (p) {
      guardar({ ...datos, escenas: datos.escenas.map((e) => (e.id === a.id ? { ...e, corchoPos: { x: Math.round(p.x * 10) / 10, y: Math.round(p.y) } } : e)) });
    }
  };

  return (
    <div
      ref={contRef}
      className="relative w-full overflow-hidden"
      style={{
        height: alto,
        background:
          "radial-gradient(circle at 25% 30%, rgba(0,0,0,0.07) 1px, transparent 1.6px) 0 0/13px 13px, radial-gradient(circle at 70% 65%, rgba(255,255,255,0.07) 1px, transparent 1.6px) 7px 7px/17px 17px, #B98A55",
      }}
    >
      <p className="absolute left-0 right-0 top-1.5 px-4 text-center text-[11px] italic" style={{ color: "rgba(253,250,241,0.9)" }}>
        Arrastra las tarjetas y suéltalas donde quieras · las flechas ← → cambian el orden del libro
      </p>
      {escenas.map((e, i) => {
        const p = posDe(e, i);
        return (
          <div
            key={e.id}
            onPointerDown={(ev) => bajar(ev, e, i)}
            onPointerMove={moverPuntero}
            onPointerUp={soltar}
            className="absolute rounded-sm p-3 pt-4 shadow-lg"
            style={{
              left: p.x + "%",
              top: p.y,
              width: anchoTarjeta,

}

function Manuscrito({ datos, guardar }) {
  const [nuevoCap, setNuevoCap] = useState("");
  const [vista, setVista] = useState("lista");
  const [corchoFull, setCorchoFull] = useState(false);
  const hayEscenas = datos.escenas.length > 0;
  const capitulos = datos.capitulos && datos.capitulos.length ? datos.capitulos : ["Capítulo 1"];
  const sinCap = datos.escenas.filter((e) => !capitulos.includes(e.capitulo));

  const mover = (id, dir) => {
    const arr = [...datos.escenas];
    const idx = arr.findIndex((e) => e.id === id);
    if (idx < 0) return;
    const cap = arr[idx].capitulo || "";
    let j = idx + dir;
    while (j >= 0 && j < arr.length && (arr[j].capitulo || "") !== cap) j += dir;
    if (j < 0 || j >= arr.length) return;
    [arr[idx], arr[j]] = [arr[j], arr[idx]];
    guardar({ ...datos, escenas: arr });
  };

  const asignar = (id, cap) => guardar({ ...datos, escenas: datos.escenas.map((e) => (e.id === id ? { ...e, capitulo: cap } : e)) });

  const anadirCapitulo = () => {
    const nombre = nuevoCap.trim();
    if (!nombre || capitulos.includes(nombre)) return;
    guardar({ ...datos, capitulos: [...capitulos, nombre] });
    setNuevoCap("");
  };

  const exportar = () => {
    let out = datos.titulo ? datos.titulo.toUpperCase() + "\n\n\n" : "";
    const grupos = [...capitulos.map((c) => [c, datos.escenas.filter((e) => e.capitulo === c)]), ["", sinCap]];
    for (const [cap, escs] of grupos) {
      if (!escs.length) continue;
      if (cap) out += cap.toUpperCase() + "\n\n";
      out += escs.map((e) => e.texto).join("\n\n* * *\n\n") + "\n\n\n";
    }
    const blob = new Blob([out], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (datos.titulo || "manuscrito") + ".txt";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const bloque = (nombre, escs) =>
    escs.length > 0 && (
      <div key={nombre || "_sin"} className="mt-3">
        <div className="mb-1.5 text-sm font-semibold" style={{ color: C.amber, fontFamily: "'EB Garamond', Georgia, serif" }}>
          {nombre || "Sin capítulo"} <span className="text-xs font-normal" style={{ color: C.dim }}>· {escs.length}</span>
        </div>
        <div className="flex flex-col gap-2">
          {escs.map((e) => (
            <EscenaGuardada
              key={e.id}
              escena={e}
              capitulos={capitulos}
              asignar={asignar}
              mover={mover}
              borrar={() => guardar({ ...datos, escenas: datos.escenas.filter((x) => x.id !== e.id) })}
            />
          ))}
        </div>
      </div>
    );

  const tarjetasCorcho = (completo) => (
    <div
      className={completo ? "min-h-full p-3" : "mt-3 rounded-lg p-3"}
      style={{
        background:
          "radial-gradient(circle at 25% 30%, rgba(0,0,0,0.07) 1px, transparent 1.6px) 0 0/13px 13px, radial-gradient(circle at 70% 65%, rgba(255,255,255,0.07) 1px, transparent 1.6px) 7px 7px/17px 17px, #B98A55",
        border: completo ? "none" : "6px solid #8A5F35",
        boxShadow: completo ? "none" : "inset 0 0 18px rgba(60,35,10,0.35)",
      }}
    >
      {[...capitulos.map((cap) => [cap, datos.escenas.filter((e) => e.capitulo === cap)]), ["", sinCap]].map(([cap, escs]) =>
        escs.length ? (
          <div key={cap || "_sin"} className="mb-4">
            <div className="f-titulo mb-2 inline-block rounded-sm px-2 py-0.5 text-sm italic shadow" style={{ background: "rgba(253,250,241,0.92)", color: C.amber }}>
              {cap || "Sin capítulo"}
            </div>
            <div className={completo ? "grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4" : "grid grid-cols-2 gap-3"}>
              {escs.map((e, i) => (
                <div
                  key={e.id}
                  className="relative rounded-sm p-3 pt-4 shadow-md"
                  style={{ background: "#FDFAF1", transform: `rotate(${i % 2 ? 0.8 : -0.8}deg)`, border: "1px solid #E7DCC0" }}
                >
                  <span className="absolute left-1/2 top-1.5 h-2.5 w-2.5 -translate-x-1/2 rounded-full" style={{ background: "#9C3D2C", boxShadow: "0 1px 2px rgba(0,0,0,0.45)" }} />
                  <div className="flex items-start justify-between gap-1">
                    <div className="text-xs font-medium leading-snug" style={{ color: C.paperInk }}>{e.titulo}</div>
                    <EtiquetaNuevo item={e} />
                  </div>
                  <p className="mt-1 text-[11px] leading-snug" style={{ color: C.paperDim }}>
                    {e.texto.slice(0, completo ? 160 : 100)}{e.texto.length > (completo ? 160 : 100) ? "…" : ""}
                  </p>
                  <div className="mt-2 flex justify-between">
                    <button onClick={() => mover(e.id, -1)} className="px-1.5 text-sm" style={{ color: C.dim }}>←</button>
                    <button onClick={() => mover(e.id, 1)} className="px-1.5 text-sm" style={{ color: C.dim }}>→</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ) : null
      )}
      <p className="text-center text-[11px] italic" style={{ color: "rgba(253,250,241,0.85)" }}>
        Mueve las tarjetas con ← → · pulsa ⛶ arriba para el corcho grande, donde puedes arrastrarlas libremente
      </p>
    </div>
  );

  return (
    <div className="mt-2">
      <div className="flex flex-wrap items-center justify-between gap-2">
        <h3 className="text-xs font-semibold uppercase tracking-widest" style={{ color: C.dim }}>
          Manuscrito · {datos.escenas.length} escena{datos.escenas.length !== 1 ? "s" : ""}
        </h3>
        {hayEscenas && (
          <div className="flex items-center gap-1.5">
            {[["lista", "Lista"], ["corcho", "Corcho"]].map(([v, l]) => (
              <button key={v} onClick={() => setVista(v)} className="rounded-full px-3 py-1 text-xs font-medium" style={{ background: vista === v ? C.amber : C.surface2, color: vista === v ? C.sobreAcento : C.dim, border: `1px solid ${C.border}` }}>
                {l}
              </button>
            ))}
            <button onClick={() => { setVista("corcho"); setCorchoFull(true); }} title="Corcho a pantalla completa" className="rounded-full px-2.5 py-1 text-xs font-medium" style={{ background: C.surface2, color: C.dim, border: `1px solid ${C.border}` }}>
              ⛶
            </button>
            <Boton pequeno onClick={exportar}>Exportar .txt</Boton>
          </div>
        )}
      </div>
      {!hayEscenas ? (
        <p className="mt-2 rounded-xl p-4 text-sm leading-relaxed" style={{ background: C.surface, color: C.dim, border: `1px dashed ${C.border}` }}>
          Aquí se irá montando tu libro, escena a escena. Cuando guardes la primera —con <b>"Guardar escena"</b> después de generarla arriba, o con <b>"Guardar en manuscrito"</b> en el modo Pulir— aparecerá en esta sección, y podrás verla en lista o clavada en un corcho de tarjetas, reordenarla, asignarla a capítulos y exportar el libro entero.
        </p>
      ) : vista === "corcho" ? (
        tarjetasCorcho(false)
      ) : (
        <>
          {capitulos.map((c) => bloque(c, datos.escenas.filter((e) => e.capitulo === c)))}
          {bloque("", sinCap)}
        </>
      )}
      {corchoFull && (
        <div className="fixed inset-0 z-50 flex flex-col" style={{ background: "#8A5F35" }}>
          <div className="flex items-center justify-between px-4 py-2" style={{ background: "rgba(253,250,241,0.96)", borderBottom: `1px solid ${C.border}` }}>
            <span className="f-titulo text-lg italic" style={{ color: C.amber }}>El corcho · {datos.escenas.length} escena{datos.escenas.length !== 1 ? "s" : ""}</span>
            <Boton pequeno onClick={() => setCorchoFull(false)}>Salir</Boton>
          </div>
          <div className="flex-1 overflow-y-auto"><CorchoLibre datos={datos} guardar={guardar} /></div>
        </div>
      )}
      {hayEscenas && (
        <div className="mt-3 flex gap-2">
          <input
            value={nuevoCap}
            onChange={(e) => setNuevoCap(e.target.value)}
            placeholder="Nombre del nuevo capítulo…"
            className="flex-1 rounded-lg px-3 py-2 text-sm outline-none"
            style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
          />
          <Boton pequeno onClick={anadirCapitulo} disabled={!nuevoCap.trim()}>+ Capítulo</Boton>
        </div>
      )}
    </div>
  );
}

// ─── Pestaña: Biblia ───
function fusionarEntidades(biblia, nuevas) {
  const copia = [...biblia];
  for (const n of nuevas) {
    if (!n?.nombre || !TIPOS[n.tipo]) continue;
    const idx = copia.findIndex((e) => e.nombre.toLowerCase() === n.nombre.toLowerCase() && e.tipo === n.tipo);
    if (idx >= 0) copia[idx] = { ...copia[idx], descripcion: n.descripcion || copia[idx].descripcion };
    else copia.push({ id: Date.now() + Math.random(), tipo: n.tipo, nombre: n.nombre, descripcion: n.descripcion || "" });
  }
  return copia;
}

function fusionarRelaciones(actuales = [], nuevas = []) {
  const copia = [...actuales];
  const clave = (x) => (x.origen + "|" + x.destino + "|" + x.relacion).toLowerCase();
  for (const r of nuevas) {
    if (!r || !r.origen || !r.destino || !r.relacion) continue;
    if (!copia.some((x) => clave(x) === clave(r))) {
      copia.push({ id: Date.now() + Math.random(), origen: r.origen, destino: r.destino, relacion: r.relacion });
    }
  }
  return copia;
}

function MapaRelaciones({ datos, guardar }) {
  const [sel, setSel] = useState(null);
  const [busqueda, setBusqueda] = useState("");
  const [nueva, setNueva] = useState({ origen: "", relacion: "", destino: "" });
  const [leyendo, setLeyendo] = useState(false);
  const [aviso, setAviso] = useState("");
  const biblia = datos.biblia;
  const relaciones = datos.relaciones || [];

  const porNombre = {};
  biblia.forEach((e) => { porNombre[e.nombre.toLowerCase()] = e; });
  const cuentaRel = (nombre) => relaciones.filter((r) => (r.origen || "").toLowerCase() === nombre || (r.destino || "").toLowerCase() === nombre).length;

  const leerFichas = async () => {
    setLeyendo(true);
    setAviso("");
    try {
      const rels = await extraerRelacionesDeFichas(biblia, biblia);
      const fusion = fusionarRelaciones(relaciones, rels);
      const nuevas = fusion.length - relaciones.length;
      guardar({ ...datos, relaciones: fusion });
      setAviso(nuevas ? `Lectura completa: ${nuevas} relación(es) nueva(s) encontrada(s) en las fichas.` : "Lectura completa: no había relaciones nuevas en las fichas.");
    } catch {
      setAviso("No se pudieron leer las fichas. Prueba de nuevo.");
    }
    setLeyendo(false);
  };

  const anadirRelacion = () => {
    if (!nueva.origen || !nueva.destino || !nueva.relacion.trim() || nueva.origen === nueva.destino) return;
    guardar({ ...datos, relaciones: fusionarRelaciones(relaciones, [{ origen: nueva.origen, destino: nueva.destino, relacion: nueva.relacion.trim() }]) });
    setNueva({ origen: "", relacion: "", destino: "" });
  };

  if (!biblia.length) {
    return (
      <p className="rounded-xl p-4 text-sm" style={{ background: C.surface, color: C.dim, border: `1px dashed ${C.border}` }}>
        El mapa se dibuja con las fichas de la biblia. Escribe escenas o procesa notas y aparecerán aquí los personajes, lugares y secretos con sus hilos.
      </p>
    );
  }

  const entSel = sel ? porNombre[sel] : null;
  let vecinos = [];
  if (entSel) {
    const mapaV = new Map();
    for (const r of relaciones) {
      const o = (r.origen || "").toLowerCase();
      const d = (r.destino || "").toLowerCase();
      if (o !== sel && d !== sel) continue;
      const otro = o === sel ? d : o;
      if (!porNombre[otro] || otro === sel) continue;
      if (!mapaV.has(otro)) mapaV.set(otro, []);
      mapaV.get(otro).push(r);
    }
    vecinos = [...mapaV.entries()];
  }
  const relacionesDe = entSel ? relaciones.filter((r) => (r.origen || "").toLowerCase() === sel || (r.destino || "").toLowerCase() === sel) : [];

  const n = vecinos.length;
  const W = 430;
  const H = n > 10 ? 470 : 430;
  const cx = W / 2;
  const cy = H / 2;
  const posiciones = vecinos.map(([nombre, rels], i) => {
    let R, a;
    if (n <= 10) {
      R = 150;
      a = (2 * Math.PI * i) / Math.max(n, 1) - Math.PI / 2;
    } else {
      const mitad = Math.ceil(n / 2);
      const interior = i < mitad;
      const idx = interior ? i : i - mitad;
      const cuenta = interior ? mitad : n - mitad;
      R = interior ? 105 : 185;
      a = (2 * Math.PI * idx) / cuenta - Math.PI / 2 + (interior ? 0 : Math.PI / cuenta);
    }
    return { nombre, rels, x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });

  return (
    <div className="flex flex-col gap-3">
      <div className="flex flex-wrap items-center justify-between gap-2">
        <p className="flex-1 text-xs leading-relaxed" style={{ color: C.dim, minWidth: 180 }}>
          {entSel
            ? "Toca a un vecino para saltar a su mundo, o vuelve a la lista."
            : "Elige una ficha para ver su constelación: solo aparece quien se relaciona con ella. Las relaciones se leen solas de lo que escribes."}
        </p>
        <Boton pequeno onClick={leerFichas} disabled={leyendo || biblia.length < 2}>
          {leyendo ? "Leyendo…" : "✦ Leer fichas"}
        </Boton>
      </div>
      <Aviso texto={aviso} />
      {!entSel && (
        <>
          <input
            value={busqueda}
            onChange={(e) => setBusqueda(e.target.value)}
            placeholder="Buscar ficha… (Willy, El Bosque, el secreto de…)"
            className="w-full rounded-lg px-3 py-2 text-sm outline-none"
            style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}` }}
          />
          <div className="flex flex-wrap gap-2">
            {biblia
              .filter((e) => e.nombre.toLowerCase().includes(busqueda.toLowerCase()))
              .sort((a, b) => cuentaRel(b.nombre.toLowerCase()) - cuentaRel(a.nombre.toLowerCase()))
              .slice(0, 40)
              .map((e) => {
                const c = cuentaRel(e.nombre.toLowerCase());
                return (
                  <button
                    key={e.id}
                    onClick={() => setSel(e.nombre.toLowerCase())}
                    className="flex items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-medium"
                    style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}` }}
                  >
                    <span className="inline-block h-2 w-2 rounded-full" style={{ background: TIPOS[e.tipo]?.color || C.amber }} />
                    {e.nombre}
                    {c > 0 && <span style={{ color: C.dim }}>· {c}</span>}
                  </button>
                );
              })}
          </div>
        </>
      )}
      {entSel && (
        <>
          <div>
            <Boton pequeno onClick={() => setSel(null)}>← Todas las fichas</Boton>
          </div>
          {n === 0 ? (
            <p className="rounded-xl p-4 text-sm" style={{ background: C.surface, color: C.dim, border: `1px dashed ${C.border}` }}>
              {entSel.nombre} todavía no tiene relaciones registradas. Añádelas a mano abajo, pulsa "✦ Leer fichas", o simplemente sigue escribiendo: se tejerán solas.
            </p>
          ) : (
            <div className="rounded-xl p-2" style={{ background: C.paper, border: `1px solid ${C.border}`, boxShadow: "0 4px 14px rgba(90,66,24,0.12)" }}>
              <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                {posiciones.map((p, i) => (
                  <g key={"l" + i}>
                    <line x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#B9A87F" strokeWidth="1.4" opacity="0.8" />
                    <text
                      x={(cx + p.x) / 2}
                      y={(cy + p.y) / 2 - 4}
                      textAnchor="middle"
                      fontSize="9.5"
                      fill="#8A6425"
                      stroke="#FDFAF1"
                      strokeWidth="3"
                      paintOrder="stroke"
                      style={{ fontStyle: "italic" }}
                    >
                      {p.rels[0].relacion.length > 18 ? p.rels[0].relacion.slice(0, 17) + "…" : p.rels[0].relacion}
                      {p.rels.length > 1 ? ` +${p.rels.length - 1}` : ""}
                    </text>
                  </g>
                ))}
                {posiciones.map((p, i) => {
                  const ent = porNombre[p.nombre];
                  return (
                    <g key={"n" + i} onClick={() => setSel(p.nombre)} style={{ cursor: "pointer" }}>
                      <circle cx={p.x} cy={p.y} r="10" fill={TIPOS[ent.tipo]?.color || C.amber} stroke="#FDFAF1" strokeWidth="2" />
                      <text
                        x={p.x}
                        y={p.y + 24}
                        textAnchor="middle"
                        fontSize="11.5"
                        fill={C.paperInk}
                        stroke="#FDFAF1"
                        strokeWidth="3"
                        paintOrder="stroke"
                        style={{ fontFamily: "'EB Garamond', Georgia, serif" }}
                      >
                        {ent.nombre.length > 15 ? ent.nombre.slice(0, 14) + "…" : ent.nombre}
                      </text>
                    </g>
                  );
                })}
                <g>
                  <circle cx={cx} cy={cy} r="15" fill={TIPOS[entSel.tipo]?.color || C.amber} stroke="#FDFAF1" strokeWidth="3" />
                  <text
                    x={cx}
                    y={cy + 32}
                    textAnchor="middle"
                    fontSize="14"
                    fontWeight="600"
                    fill={C.paperInk}
                    stroke="#FDFAF1"
                    strokeWidth="4"
                    paintOrder="stroke"
                    style={{ fontFamily: "'EB Garamond', Georgia, serif" }}
                  >
                    {entSel.nombre}
                  </text>
                </g>
              </svg>
            </div>
          )}
          {relacionesDe.length > 0 && (
            <div className="rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
              <div className="text-sm font-medium" style={{ color: C.text }}>El mundo de {entSel.nombre}</div>
              {relacionesDe.map((r) => (
                <div key={r.id} className="mt-1.5 flex items-center justify-between gap-2 text-sm" style={{ color: C.text }}>
                  <span>
                    {r.origen} <span className="italic" style={{ color: C.amber }}>{r.relacion}</span> {r.destino}
                  </span>
                  <button onClick={() => guardar({ ...datos, relaciones: relaciones.filter((x) => x.id !== r.id) })} className="text-xs" style={{ color: C.dim }}>✕</button>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      <div className="flex flex-col gap-2 rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
        <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.dim }}>Añadir relación a mano</span>
        <div className="flex flex-wrap items-center gap-2">
          <select value={nueva.origen} onChange={(e) => setNueva({ ...nueva, origen: e.target.value })} className="rounded-lg px-2 py-1.5 text-xs outline-none" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}>
            <option value="">¿Quién / qué?</option>
            {biblia.map((e) => (<option key={e.id} value={e.nombre}>{e.nombre}</option>))}
          </select>
          <input value={nueva.relacion} onChange={(e) => setNueva({ ...nueva, relacion: e.target.value })} placeholder="relación (ama a, odia a, vive en…)" className="flex-1 rounded-lg px-2 py-1.5 text-xs outline-none" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}`, minWidth: 130 }} />
          <select value={nueva.destino} onChange={(e) => setNueva({ ...nueva, destino: e.target.value })} className="rounded-lg px-2 py-1.5 text-xs outline-none" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}>
            <option value="">¿Con quién / qué?</option>
            {biblia.map((e) => (<option key={e.id} value={e.nombre}>{e.nombre}</option>))}
          </select>
          <Boton pequeno onClick={anadirRelacion} disabled={!nueva.origen || !nueva.destino || !nueva.relacion.trim()}>Añadir</Boton>
        </div>
      </div>
    </div>
  );
}

    setError("");
    setHallazgos(null);
    try {
      const manuscrito = datos.escenas
        .map((e, i) => `[Escena ${i + 1}${e.capitulo ? " · " + e.capitulo : ""}]\n${e.texto}`)
        .join("\n\n")
        .slice(-9000);
      const prompt = `Eres un editor de continuidad profesional. Compara el manuscrito con la biblia de la historia y detecta inconsistencias: personajes cuyos rasgos o datos cambian, contradicciones de hechos, lugares o tiempos imposibles, secretos revelados antes de tiempo, cabos sueltos importantes.

BIBLIA DE LA HISTORIA:
${serializarBiblia(datos.biblia)}

MANUSCRITO (en orden):
${manuscrito}

Responde SOLO con JSON válido, sin markdown:
{"hallazgos":[{"donde":"escena o lugar aproximado","problema":"qué falla exactamente","gravedad":"alta","sugerencia":"cómo arreglarlo"}]}
Gravedad permitida: alta, media, baja. Máximo 8 hallazgos, los más graves primero. Si todo es coherente, devuelve {"hallazgos":[]}.`;
      const parsed = JSON.parse((await llamarIA(prompt)).replace(/```json|```/g, "").trim());
      setHallazgos(Array.isArray(parsed.hallazgos) ? parsed.hallazgos : []);
    } catch {
      setError("No se pudo completar la revisión. Inténtalo de nuevo.");
    }
    setCargando(false);
  };

  return (
    <div className="rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
      <div className="flex items-center justify-between gap-2">
        <div>
          <div className="text-sm font-medium" style={{ color: C.text }}>Detector de inconsistencias</div>
          <div className="text-xs" style={{ color: C.dim }}>Revisa todo el manuscrito contra la biblia.</div>
        </div>
        <Boton pequeno primario onClick={revisar} disabled={cargando}>
          {cargando ? "Revisando…" : "Revisar"}
        </Boton>
      </div>
      {error && <p className="mt-2 text-xs" style={{ color: "#9C3D2C" }}>{error}</p>}
      {hallazgos && hallazgos.length === 0 && (
        <p className="mt-2 text-xs" style={{ color: "#4F6B3A" }}>Todo coherente: no se han encontrado contradicciones.</p>
      )}
      {hallazgos &&
        hallazgos.map((h, i) => (
          <div key={i} className="mt-2 rounded-lg p-2.5" style={{ background: C.surface2, border: `1px solid ${C.border}` }}>
            <div className="flex items-center gap-2">
              <span className="rounded-full px-2 py-0.5 text-[10px] font-semibold uppercase" style={{ color: gravColor[h.gravedad] || C.amber, border: `1px solid ${C.border}` }}>

            <p className="mt-1 text-sm leading-relaxed" style={{ color: C.text }}>{h.problema}</p>
            {h.sugerencia && <p className="mt-1 text-xs leading-relaxed" style={{ color: "#4F6B3A" }}>Arreglo: {h.sugerencia}</p>}
          </div>
        ))}
    </div>
  );
}

function TabBiblia({ datos, guardar }) {
  const [filtro, setFiltro] = useState("todos");
  const [vista, setVista] = useState("fichas");
  const [nuevo, setNuevo] = useState(null);
  const lista = datos.biblia.filter((e) => filtro === "todos" || e.tipo === filtro);

  const [avisoFicha, setAvisoFicha] = useState("");

  const analizarFicha = async (ficha, datosBase) => {
    if (!ficha.descripcion || !ficha.descripcion.trim() || datosBase.biblia.length < 2) return;
    try {
      const rels = await extraerRelacionesDeFichas([ficha], datosBase.biblia);
      if (rels.length) {
        guardar({ ...datosBase, relaciones: fusionarRelaciones(datosBase.relaciones, rels) });
        setAvisoFicha(`Lectura inteligente: ${rels.length} relación(es) detectada(s) en la ficha de ${ficha.nombre}. Míralas en el mapa.`);
      }
    } catch {
      // lectura en segundo plano: si falla, no molesta
    }
  };

  const anadir = () => {
    if (!nuevo?.nombre?.trim()) return;
    const nuevos = { ...datos, biblia: fusionarEntidades(datos.biblia, [nuevo]) };
    guardar(nuevos);
    analizarFicha(nuevo, nuevos);
    setNuevo(null);
  };

  return (
    <div className="flex flex-col gap-3">
      {datos.escenas.length > 0 && <Coherencia datos={datos} />}
      <div className="flex rounded-xl p-1" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
        {[["fichas", "Fichas"], ["mapa", "Mapa de relaciones"]].map(([v, l]) => (
          <button key={v} onClick={() => setVista(v)} className="flex-1 rounded-lg py-2 text-sm font-medium" style={{ background: vista === v ? C.amber : "transparent", color: vista === v ? C.sobreAcento : C.dim }}>
            {l}
          </button>
        ))}
      </div>
      {vista === "mapa" ? (
        <MapaRelaciones datos={datos} guardar={guardar} />
      ) : (
        <>
      <div className="flex flex-wrap gap-2">
        {["todos", ...Object.keys(TIPOS)].map((t) => (
          <button
            key={t}
            onClick={() => setFiltro(t)}
            className="rounded-full px-3 py-1 text-xs font-medium"
            style={{
              background: filtro === t ? (TIPOS[t]?.color || C.amber) : C.surface2,
              color: filtro === t ? C.sobreAcento : C.dim,
              border: `1px solid ${C.border}`,
            }}
          >
            {t === "todos" ? "Todo" : TIPOS[t].plural}
          </button>
        ))}
      </div>
      {lista.length === 0 && (
        <p className="rounded-xl p-4 text-sm" style={{ background: C.surface, color: C.dim, border: `1px dashed ${C.border}` }}>
          La biblia se irá llenando sola cuando escribas escenas o proceses notas. También puedes añadir fichas a mano.
        </p>
      )}
      <Aviso texto={avisoFicha} />
      {lista.map((e) => (
        <Ficha
          key={e.id}
          entidad={e}
          guardarEntidad={(ed) => {
            const nuevos = { ...datos, biblia: datos.biblia.map((x) => (x.id === e.id ? ed : x)) };
            guardar(nuevos);
            analizarFicha(ed, nuevos);
          }}
          borrar={() => guardar({ ...datos, biblia: datos.biblia.filter((x) => x.id !== e.id) })}
        />
      ))}
      {nuevo ? (
        <div className="flex flex-col gap-2 rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
          <select value={nuevo.tipo} onChange={(e) => setNuevo({ ...nuevo, tipo: e.target.value })} className="rounded-lg px-3 py-2 text-sm" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}>
            {Object.entries(TIPOS).map(([k, v]) => (
              <option key={k} value={k}>{v.label}</option>
            ))}
          </select>
          <input value={nuevo.nombre} onChange={(e) => setNuevo({ ...nuevo, nombre: e.target.value })} placeholder="Nombre" className="rounded-lg px-3 py-2 text-sm outline-none" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }} />
          <AreaConMic value={nuevo.descripcion} onChange={(v) => setNuevo({ ...nuevo, descripcion: v })} placeholder="Descripción, rasgos, historia…" rows={3} />
          <div className="flex gap-2">
            <Boton primario pequeno onClick={anadir}>Guardar ficha</Boton>
            <Boton pequeno onClick={() => setNuevo(null)}>Cancelar</Boton>
          </div>
        </div>
      ) : (
        <Boton onClick={() => setNuevo({ tipo: "personaje", nombre: "", descripcion: "" })}>+ Añadir ficha a mano</Boton>
      )}
        </>
      )}
    </div>
  );
}

    const nota = { id: Date.now(), texto: texto.trim(), fecha: new Date().toLocaleDateString("es-ES") };
    guardar({ ...datos, notas: [nota, ...datos.notas] });

  const procesar = async (nota) => {

    setEstado("");

      const ext = await extraerEntidades(nota.texto, datos.biblia);
      if (ext.entidades.length || ext.relaciones.length) {
        guardar({
          ...datos,
          biblia: fusionarEntidades(datos.biblia, ext.entidades),
          relaciones: fusionarRelaciones(datos.relaciones, ext.relaciones),

${nota.texto}

Entre 1 y 6 ideas, cada una autónoma y útil. Ignora muletillas, repeticiones y relleno. Si menciona personajes, lugares, secretos o giros, consérvalos con precisión.`;

      <div className="flex flex-wrap gap-2">
        <BotonMic dictado={dictado} />

      <Aviso texto={estado} />

function extraerPuntosEscaleta(raw) {
  const limpio = raw.replace(/```json|```/g, "").trim();
  try {
    const desde = limpio.indexOf("{");
    const parsed = JSON.parse(desde >= 0 ? limpio.slice(desde) : limpio);
    if (Array.isArray(parsed.escaleta)) return parsed.escaleta;
  } catch {
    // JSON incompleto o con adornos: rescatamos los puntos que estén enteros
  }
  const trozos = limpio.match(/\{[^{}]*"acto"[^{}]*\}/g) || [];
  const puntos = [];
  for (const t of trozos) {
    try { puntos.push(JSON.parse(t)); } catch { /* trozo cortado, lo saltamos */ }
  }
  return puntos;
}

// ─── Pestaña: Trama (esqueleto y escaleta) ───
function TabTrama({ datos, guardar, usarComoResumen }) {
  const trama = datos.trama || { inicio: "", final: "", hitos: "", escaleta: [] };
  const [inicio, setInicio] = useState(trama.inicio);
  const [final, setFinal] = useState(trama.final);
  const [hitos, setHitos] = useState(trama.hitos);
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState("");

  const persistir = (extra = {}) => guardar({ ...datos, trama: { ...trama, inicio, final, hitos, ...extra } });

  const generarEscaleta = async () => {
    if (!inicio.trim() && !final.trim() && !hitos.trim()) {
      setError("Necesito al menos un dato para trabajar: cuéntame cómo empieza (quién y en qué situación), cómo acaba, o algo que deba ocurrir por el camino. Con uno solo de los tres me vale.");
      return;
    }
    setCargando(true);
    setError("");
    try {
      const prompt = `Eres un arquitecto de tramas profesional. A partir del esqueleto del autor, construye la escaleta cronológica completa de la novela.

GÉNERO DE LA OBRA:
${(GENEROS[datos.genero] || GENEROS.auto).guia}

ESTRUCTURA DE REFERENCIA: modelo clásico de tres actos con puntos de giro (detonante al final del Acto I, punto medio que lo cambia todo, crisis, clímax y desenlace), como en las escaletas de los maestros.
${CANON[datos.genero] || CANON.auto}

BIBLIA DE LA HISTORIA:
${serializarBiblia(datos.biblia)}

ASÍ EMPIEZA: ${inicio.trim() || "(el autor no lo ha decidido: proponlo tú)"}
ASÍ TERMINA: ${final.trim() || "(el autor no lo ha decidido: proponlo tú)"}
DEBE OCURRIR POR EL CAMINO: ${hitos.trim() || "(nada obligatorio)"}

Responde SOLO con JSON válido en UNA sola línea, sin markdown ni texto extra:
{"escaleta":[{"acto":"Acto I","titulo":"3-5 palabras","descripcion":"qué ocurre, máximo 20 palabras"}]}
Exactamente entre 8 y 10 puntos en orden cronológico, repartidos entre Acto I, Acto II y Acto III. Respeta el inicio, el final y los hitos obligatorios, colocándolos donde más tensión narrativa generen. Sé breve: descripciones cortas y concretas.`;
      const puntos = extraerPuntosEscaleta(await llamarIA(prompt))
        .filter((p) => p && p.titulo && p.descripcion)
        .map((p) => ({ acto: p.acto || "Acto II", titulo: p.titulo, descripcion: p.descripcion, id: Date.now() + Math.random() }));
      if (!puntos.length) {
        setError("No conseguí montar una escaleta con esto. Dame algo más de carne: en 'Así empieza' di quién es el protagonista y su situación, y en 'Debe ocurrir' al menos un suceso concreto (una muerte, un hallazgo, una traición…). Luego vuelve a intentarlo.");
      } else {
        persistir({ escaleta: puntos });
        if (puntos.length < 8) setError(`He montado ${puntos.length} puntos. Si quieres una escaleta más completa, dale a "Rehacer escaleta".`);
      }
    } catch {
      setError("El arquitecto no respondió esta vez (fallo de conexión o de la IA). Espera unos segundos y vuelve a pulsar el botón; el esqueleto que escribiste sigue guardado.");
    }
    setCargando(false);
  };

  const escaleta = trama.escaleta || [];
  let actoPrevio = null;

  return (
    <div className="flex flex-col gap-3">
      <p className="text-xs leading-relaxed" style={{ color: C.dim }}>
        El esqueleto del libro: dime cómo empieza, cómo acaba y qué debe ocurrir por el camino. El arquitecto de tramas lo convierte en una escaleta cronológica por actos, y cada punto puede ir directo al auto-escritor.
      </p>
      <div>
        <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>Así empieza</span>
        <AreaConMic value={inicio} onChange={setInicio} placeholder="Ej.: Dos hermanos entierran algo en el bosque al amanecer…" rows={2} />
      </div>
      <div>
        <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>Así termina</span>
        <AreaConMic value={final} onChange={setFinal} placeholder="Ej.: Solo uno de los dos sale del pueblo, y no es el que esperábamos…" rows={2} />
      </div>
      <div>
        <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>Debe ocurrir por el camino</span>
        <AreaConMic value={hitos} onChange={setHitos} placeholder="Ej.: alguien encuentra la pista; muere el testigo; se descubre el secreto de la madre…" rows={2} />
      </div>
      <div className="flex flex-wrap gap-2">
        <Boton primario onClick={generarEscaleta} disabled={cargando}>
          {cargando ? "Construyendo…" : escaleta.length ? "Rehacer escaleta" : "Generar escaleta"}
        </Boton>
        <Boton onClick={() => persistir()}>Guardar esqueleto</Boton>
      </div>
      {error && <p className="text-xs" style={{ color: "#9C3D2C" }}>{error}</p>}
      {escaleta.map((p, i) => {
        const nuevoActo = p.acto !== actoPrevio;
        actoPrevio = p.acto;
        return (
          <div key={p.id}>
            {nuevoActo && (
              <div className="f-titulo mb-1 mt-2 text-lg italic" style={{ color: C.amber }}>
                {p.acto}
              </div>
            )}
            <div className="flex overflow-hidden rounded-xl" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
              <div className="flex w-9 shrink-0 items-center justify-center text-sm font-semibold" style={{ background: C.surface2, color: C.dim }}>
                {i + 1}
              </div>
              <div className="flex-1 p-3">
                <div className="text-sm font-medium" style={{ color: C.text }}>{p.titulo}</div>
                <p className="mt-0.5 text-sm leading-relaxed" style={{ color: C.dim }}>{p.descripcion}</p>
                <div className="mt-2 flex gap-2">
                  <Boton pequeno onClick={() => usarComoResumen(`Punto de la escaleta (${p.acto}): ${p.titulo}. ${p.descripcion}`)}>→ Escribir escena</Boton>
                  <Boton pequeno onClick={() => persistir({ escaleta: escaleta.filter((x) => x.id !== p.id) })} style={{ color: "#9C3D2C" }}>✕</Boton>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

${idea.texto}

DESARROLLOS YA ACEPTADOS POR EL AUTOR (respétalos, no los contradigas):
${apuntes}

BIBLIA DE LA HISTORIA (por si alguna propuesta puede conectar con algo o alguien existente):
${serializarBiblia(biblia)}

${enfoque ? `EL AUTOR QUIERE RESOLVER ESTO EN CONCRETO: ${enfoque}` : "Detecta los huecos abiertos de la idea (lo que falta por decidir) y propón formas concretas de resolverlos."}

Responde SOLO con JSON válido, sin markdown ni explicaciones: {"propuestas":["...","...","...","..."]}
Cada propuesta debe tener 1-3 frases, ser concreta y accionable (con detalles específicos: objetos, gestos, motivos), y distinta de las demás.`;
  const raw = await llamarIA(prompt);
  const parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
  return Array.isArray(parsed.propuestas) ? parsed.propuestas : [];
}

function TabIdeas({ datos, guardar, usarComoResumen }) {

    if (!texto.trim()) return;
    dictado.parar();
    const idea = { id: Date.now(), texto: texto.trim(), fecha: new Date().toLocaleDateString("es-ES"), apuntes: [] };

  return (
    <div className="flex flex-col gap-3">
      <p className="text-xs leading-relaxed" style={{ color: C.dim }}>

      </p>
      <Area value={texto + (dictado.parcial ? " " + dictado.parcial : "")} onChange={setTexto} placeholder="Ej.: Dos hermanos cometen un asesinato en el bosque y escapan, pero dejan una pista. ¿Cuál? ¿Quién la encuentra? Ni idea todavía…" rows={3} />

        </p>

function IdeaCard({ idea, datos, actualizar, borrar, usarComoResumen }) {
  const biblia = datos.biblia;
  const [abierta, setAbierta] = useState(false);
  const [enfoque, setEnfoque] = useState("");
  const [propuestas, setPropuestas] = useState([]);
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState("");
  const [apunteManual, setApunteManual] = useState("");
  const [encaje, setEncaje] = useState("");
  const [buscandoEncaje, setBuscandoEncaje] = useState(false);
  const apuntes = idea.apuntes || [];

  const dondeEncaja = async () => {
    setBuscandoEncaje(true);
    setEncaje("");
    try {
      const escaleta = (datos.trama?.escaleta || []).map((p, i) => `${i + 1}. [${p.acto}] ${p.titulo}: ${p.descripcion}`).join("\n") || "(sin escaleta todavía)";
      const escenas = datos.escenas.map((e, i) => `${i + 1}. ${e.capitulo ? "[" + e.capitulo + "] " : ""}${e.titulo}`).join("\n") || "(sin escenas todavía)";
      const prompt = `Eres un arquitecto de tramas. El autor tiene esta idea suelta y no sabe en qué punto del libro colocarla.

IDEA:
${resumenCompleto()}

ESCALETA DE LA OBRA:
${escaleta}

ESCENAS YA ESCRITAS (en orden):
${escenas}

BIBLIA:
${serializarBiblia(biblia)}

En 3-5 frases: recomienda el punto exacto donde mejor encaja esta idea (tras qué punto de la escaleta, o entre qué escenas o capítulos; da una segunda alternativa si la hay), por qué funciona ahí narrativamente (tensión, ritmo, revelación) y qué habría que sembrar antes para que funcione. Si aún no hay escaleta ni escenas, recomienda en qué tramo del libro debería ir (principio, primer tercio, ecuador, clímax…). Responde solo con la recomendación, sin JSON.`;
      setEncaje(await llamarIA(prompt));
    } catch {
      setEncaje("No se pudo calcular el encaje. Prueba de nuevo.");
    }
    setBuscandoEncaje(false);
  };

  const pedir = async () => {
    setCargando(true);
    setError("");
    try {
      setPropuestas(await proponerDesarrollos(idea, enfoque.trim(), biblia));
    } catch {
      setError("El asesor no pudo responder esta vez. Prueba de nuevo.");
    }
    setCargando(false);
  };

  const quedarse = (p) => {
    actualizar({ ...idea, apuntes: [...apuntes, { id: Date.now() + Math.random(), texto: p }] });
    setPropuestas(propuestas.filter((x) => x !== p));
  };

  const resumenCompleto = () =>
    idea.texto + (apuntes.length ? "\n\nDesarrollos ya decididos por el autor:\n" + apuntes.map((a) => "- " + a.texto).join("\n") : "");

  return (
    <div className="flex overflow-hidden rounded-xl" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
      <div className="w-1.5 shrink-0" style={{ background: C.amber, opacity: 0.55 }} />
      <div className="flex-1 p-3">
        <button onClick={() => setAbierta(!abierta)} className="flex w-full items-center justify-between gap-2 text-left">
          <div>
            <div className="text-sm" style={{ color: C.text }}>
              {idea.texto.slice(0, 80)}{idea.texto.length > 80 ? "…" : ""}
            </div>
            <div className="text-xs" style={{ color: C.dim }}>
              {idea.fecha} · {apuntes.length} desarrollo{apuntes.length !== 1 ? "s" : ""} decidido{apuntes.length !== 1 ? "s" : ""} <EtiquetaNuevo item={idea} />
            </div>
          </div>
          <span style={{ color: C.dim }}>{abierta ? "▴" : "▾"}</span>
        </button>
        {abierta && (
          <div className="mt-3 flex flex-col gap-3">
            <p className="whitespace-pre-wrap text-sm leading-relaxed" style={{ color: C.text }}>{idea.texto}</p>
            {apuntes.length > 0 && (
              <div className="flex flex-col gap-1.5">
                <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>Desarrollos decididos</span>
                {apuntes.map((a) => (
                  <div key={a.id} className="flex items-start justify-between gap-2 rounded-lg p-2 text-sm" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}>
                    <span className="leading-relaxed">{a.texto}</span>
                    <button onClick={() => actualizar({ ...idea, apuntes: apuntes.filter((x) => x.id !== a.id) })} className="text-xs" style={{ color: C.dim }}>✕</button>
                  </div>
                ))}
              </div>
            )}
            <div className="rounded-xl p-3" style={{ background: C.bg, border: `1px solid ${C.border}` }}>
              <span className="text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.dim }}>Asesor creativo</span>
              <input
                value={enfoque}
                onChange={(e) => setEnfoque(e.target.value)}
                placeholder="Opcional: qué hueco quieres resolver (ej. ¿cuál es la pista?)"
                className="mt-2 w-full rounded-lg px-3 py-2 text-sm outline-none"
                style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
              />
              <div className="mt-2 flex gap-2">
                <Boton primario pequeno onClick={pedir} disabled={cargando}>
                  {cargando ? "Pensando…" : propuestas.length ? "Más opciones" : "Pedir propuestas"}
                </Boton>
              </div>
              {error && <p className="mt-2 text-xs" style={{ color: "#9C3D2C" }}>{error}</p>}
              {propuestas.map((p, i) => (
                <div key={i} className="mt-2 rounded-lg p-2.5" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
                  <p className="text-sm leading-relaxed" style={{ color: C.text }}>{p}</p>
                  <div className="mt-1.5">
                    <Boton pequeno onClick={() => quedarse(p)} style={{ color: C.amber }}>✓ Quedármela</Boton>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex gap-2">
              <input
                value={apunteManual}
                onChange={(e) => setApunteManual(e.target.value)}
                placeholder="O añade tu propio desarrollo…"
                className="flex-1 rounded-lg px-3 py-2 text-sm outline-none"
                style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
              />
              <Boton pequeno onClick={() => { if (apunteManual.trim()) { quedarse(apunteManual.trim()); setApunteManual(""); } }} disabled={!apunteManual.trim()}>
                Añadir
              </Boton>
            </div>
            {encaje && (
              <div className="rounded-xl p-3 text-sm leading-relaxed" style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}>
                <span className="mb-1 block text-[10px] font-semibold uppercase tracking-widest" style={{ color: C.amber }}>Dónde encaja</span>
                {encaje}
              </div>
            )}
            <div className="flex flex-wrap gap-2 border-t pt-2" style={{ borderColor: C.border }}>
              <Boton pequeno onClick={() => usarComoResumen(resumenCompleto())}>→ Escribir escena</Boton>
              <Boton pequeno onClick={dondeEncaja} disabled={buscandoEncaje}>{buscandoEncaje ? "Pensando…" : "¿Dónde encaja?"}</Boton>
              <Boton pequeno onClick={borrar} style={{ color: "#9C3D2C" }}>Borrar idea</Boton>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TituloLibro({ datos, guardar }) {
  const [t, setT] = useState(datos.titulo || "");
  useEffect(() => setT(datos.titulo || ""), [datos.titulo]);
  return (
    <input
      value={t}
      onChange={(e) => setT(e.target.value)}
      onBlur={() => { if (t.trim() !== (datos.titulo || "")) guardar({ ...datos, titulo: t.trim() }); }}
      placeholder="Título de tu libro…"
      className="f-titulo mt-3 w-full bg-transparent pb-1 text-center text-xl italic outline-none"
      style={{ color: C.amber, borderBottom: `1px dashed ${C.border}` }}
    />
  );
}

function BorrarLibro({ onConfirm }) {
  const [seguro, setSeguro] = useState(false);
  useEffect(() => {
    if (seguro) {
      const t = setTimeout(() => setSeguro(false), 4000);
      return () => clearTimeout(t);
    }
  }, [seguro]);
  return (
    <Boton
      pequeno
      onClick={() => {
        if (seguro) {
          setSeguro(false);
          onConfirm();
        } else setSeguro(true);
      }}
      style={{ color: "#9C3D2C" }}
    >
      {seguro ? "¿Seguro?" : "Borrar"}
    </Boton>
  );
}
